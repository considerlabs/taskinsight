events {
    worker_connections 1024;
}

http {
    client_max_body_size 25M;  # 파일 업로드 최대 크기 (MAX_UPLOAD_SIZE_MB + 여유)

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name _;

        # 보안 헤더
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        # API 요청 → FastAPI
        location /v1/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # LLM 응답 대기 (최대 3분)
            proxy_read_timeout 180s;
            proxy_connect_timeout 10s;
        }

        # 관리 엔드포인트 → FastAPI
        location /admin/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 헬스체크
        location /health {
            proxy_pass http://backend;
        }

        # 파일 다운로드 → FastAPI (큰 파일 지원)
        location /v1/attachments/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_read_timeout 60s;
        }

        # 나머지 모두 → Next.js 프론트엔드
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Next.js HMR WebSocket (개발 환경)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # HTTPS 사용 시 아래 주석 해제 후 인증서 경로 지정
    # server {
    #     listen 443 ssl;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #
    #     # 위 location 블록들을 여기에 복붙
    # }
}
